<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Atendimento · Preto & Verde Fluorescente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .portal-card {
            max-width: 1200px;
            width: 100%;
            background-color: #0a0a0a;
            border: 3px solid #00ff80;
            border-radius: 4rem 4rem 3rem 3rem;
            padding: 3rem 3rem 4rem 3rem;
            box-shadow: 0 25px 50px rgba(0, 255, 128, 0.2), 0 0 0 2px #00ff8033 inset;
        }

        /* Título Portal de Atendimento (mantido) */
        .titulo {
            text-align: center;
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: #00ff80;
            text-transform: uppercase;
            word-break: break-word;
            margin-bottom: 2rem;
            text-shadow: 0 0 8px #00ff80, 0 0 20px #00ff804d;
            border-bottom: 4px dashed #00ff80;
            padding-bottom: 1.8rem;
        }

        /* texto informativo (provedor de fibra) – sem nome de empresa */
        .texto-institucional {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 500;
            line-height: 1.4;
            color: #e0ffe6;
            background: rgba(0, 255, 128, 0.05);
            border: 2px solid #00ff80;
            border-radius: 3rem;
            padding: 2rem 2.5rem;
            margin-bottom: 3rem;
            box-shadow: 0 0 25px rgba(0, 255, 128, 0.3);
            backdrop-filter: blur(2px);
        }

        .texto-institucional p {
            max-width: 900px;
            margin: 0 auto;
        }

        .texto-institucional strong {
            color: #00ff80;
            font-weight: 600;
            text-shadow: 0 0 5px #00ff80;
        }

        /* botões em linha */
        .botoes-linha {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem 2.5rem;
            margin-top: 1rem;
        }

        .btn-atendimento {
            background: transparent;
            border: 4px solid #00ff80;
            border-radius: 3rem;
            padding: 1.8rem 2.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            font-size: 2.4rem;
            font-weight: 700;
            color: #00ff80;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 0 15px #00ff8026, inset 0 0 12px #00ff801a;
            line-height: 1;
            text-align: center;
            flex: 0 1 auto;
            min-width: 220px;
        }

        .btn-atendimento span {
            font-size: 2.8rem;
            filter: drop-shadow(0 0 8px #00ff80);
        }

        .btn-atendimento:hover {
            background-color: #00ff80;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 35px #00ff80, 0 0 70px #00ff80cc;
            transform: scale(1.05);
        }

        .btn-atendimento:hover span {
            filter: none;
        }

        .btn-whatsapp span {
            font-size: 3rem;
        }

        .btn-atendimento:focus-visible {
            outline: 4px solid white;
            outline-offset: 4px;
            background-color: #00ff80;
            color: black;
        }

        /* responsividade */
        @media (max-width: 1000px) {
            .titulo {
                font-size: 3.2rem;
            }
            .texto-institucional {
                font-size: 2rem;
                padding: 1.8rem 2rem;
            }
        }

        @media (max-width: 900px) {
            .portal-card {
                padding: 2.5rem 2rem;
            }
            .btn-atendimento {
                font-size: 2.2rem;
                padding: 1.5rem 2.2rem;
            }
            .texto-institucional {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 650px) {
            .botoes-linha {
                gap: 1.5rem;
            }
            .btn-atendimento {
                font-size: 2rem;
                padding: 1.2rem 1.8rem;
                min-width: 190px;
            }
            .texto-institucional {
                font-size: 1.6rem;
                padding: 1.5rem;
            }
        }

        @media (max-width: 500px) {
            .titulo {
                font-size: 2.5rem;
            }
            .texto-institucional {
                font-size: 1.4rem;
                border-radius: 2rem;
            }
            .btn-atendimento {
                font-size: 1.8rem;
                padding: 1rem 1.2rem;
                gap: 0.8rem;
            }
            .btn-atendimento span {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="portal-card">
        <!-- Título reinserido no início -->
        <div class="titulo">Portal de Atendimento</div>

        <!-- Texto institucional (fibra óptica, sem menção a empresa) -->
        <div class="texto-institucional">
            <p>
                ⚡ <strong>Fibra óptica de alta velocidade</strong> · conexão estável e simétrica · 
                atendimento 100% digital · suporte técnico especializado · planos sob medida 
                para sua casa ou negócio · <strong>tecnologia de ponta</strong> com a melhor experiência em fibra.
            </p>
        </div>

        <!-- Botões na ordem: Atendimento, Whatsapp, Chat, Dúvidas. Todos enviam para o WhatsApp com mensagens personalizadas -->
        <div class="botoes-linha">
            <!-- 1º Atendimento -->
            <a href="#" class="btn-atendimento" id="btn-atendimento" role="button" tabindex="0">
                <span>👤</span> Atendimento
            </a>

            <!-- 2º Whatsapp -->
            <a href="#" class="btn-atendimento btn-whatsapp" id="btn-whatsapp" role="button" tabindex="0">
                <span>📱</span> Whatsapp
            </a>

            <!-- 3º Chat -->
            <a href="#" class="btn-atendimento" id="btn-chat" role="button" tabindex="0">
                <span>💬</span> Chat
            </a>

            <!-- 4º Dúvidas -->
            <a href="#" class="btn-atendimento" id="btn-duvidas" role="button" tabindex="0">
                <span>❓</span> Dúvidas
            </a>
        </div>
    </div>

    <!-- Script que faz TODOS os botões redirecionarem para o WhatsApp com mensagens específicas -->
    <script>
        (function() {
            // Número de WhatsApp (formatado internacionalmente sem o +)
            const numeroWhatsApp = '5511948772959';  // 11 94877-2959 -> 5511948772959
            
            // Mensagens personalizadas para cada botão
            const mensagens = {
                'btn-atendimento': 'Olá! Gostaria de falar com o setor de Atendimento.',
                'btn-whatsapp': 'Olá! Vim pelo WhatsApp do portal.',
                'btn-chat': 'Olá! Gostaria de atendimento via Chat.',
                'btn-duvidas': 'Olá! Tenho algumas dúvidas sobre os serviços.'
            };

            // Seleciona todos os botões
            const botoes = document.querySelectorAll('.btn-atendimento');
            
            botoes.forEach(btn => {
                btn.addEventListener('click', (event) => {
                    event.preventDefault();  // impede o href vazio
                    
                    // Pega o ID do botão clicado
                    const id = btn.id;
                    
                    // Define a mensagem padrão caso não encontre o ID
                    let mensagem = 'Olá! Gostaria de mais informações.';
                    
                    if (id && mensagens[id]) {
                        mensagem = mensagens[id];
                    }
                    
                    // Codifica a mensagem para URL
                    const textoCodificado = encodeURIComponent(mensagem);
                    
                    // Cria o link do WhatsApp
                    const linkWhatsApp = `https://wa.me/${numeroWhatsApp}?text=${textoCodificado}`;
                    
                    // Redireciona a página para o link do WhatsApp
                    window.location.href = linkWhatsApp;
                });
            });
        })();
    </script>
</body>
</html>
